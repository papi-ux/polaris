name: Build Polaris

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  web-checks:
    name: Web checks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install web dependencies
        run: npm ci --no-audit --fund=false

      - name: Lint web UI
        run: npm run lint

      - name: Test web UI
        run: npm run test

      - name: Build web UI bundle
        run: npm run build-clean

      - name: Pack web UI bundle
        run: tar -czf web-ui-build.tar.gz -C build/assets web

      - name: Upload web UI bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-build
          path: web-ui-build.tar.gz
          if-no-files-found: error

  arch-build:
    name: Arch build
    needs: web-checks
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    env:
      CCACHE_DIR: /github/home/.cache/ccache
      CCACHE_COMPILERCHECK: content

    steps:
      - name: Bootstrap Arch container
        run: pacman -Syu --noconfirm --needed archlinux-keyring git

      - uses: actions/checkout@v5
        if: startsWith(github.ref, 'refs/tags/v')

      - uses: actions/checkout@v5
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Initialize submodules
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          for attempt in 1 2 3 4 5; do
            git submodule sync --recursive
            if git -c protocol.version=2 submodule update --init --force --recursive --jobs 1; then
              exit 0
            fi
            echo "submodule update failed on attempt ${attempt}" >&2
            git submodule deinit --force --all || true
            sleep $((attempt * 15))
          done
          exit 1

      - name: Cache C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: polaris-arch-ccache-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*', 'tests/**/*') }}
          restore-keys: |
            polaris-arch-ccache-

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: /github/home/.npm
          key: polaris-arch-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            polaris-arch-npm-

      - name: Install dependencies
        run: |
          pacman -S --noconfirm --needed \
            appstream appstream-glib avahi base-devel boost boost-libs ccache cmake curl \
            desktop-file-utils ffmpeg gtk3 libayatana-appindicator libcap \
            gcc libdrm libevdev libmfx libnotify libpulse libva libx11 libxcb \
            libxfixes libxi libxrandr libxtst mesa miniupnpc ninja nodejs \
            nlohmann-json npm numactl openssl opus pipewire wayland wayland-protocols which

      - name: Configure
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          cmake -B build -G Ninja \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF

      - name: Download prebuilt web UI bundle
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/download-artifact@v8
        with:
          name: web-ui-build
          path: .

      - name: Prepare prebuilt web UI bundle
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p build/assets build/CMakeFiles node_modules
          tar -xzf web-ui-build.tar.gz -C build/assets
          touch node_modules/.polaris-web-ui-npm.stamp build/CMakeFiles/web-ui-build.stamp

      - name: Build
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: cmake --build build -j"$(nproc)"

      - name: Run fast C++ tests
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ctest --test-dir build/tests --output-on-failure -R '^test_polaris$'

      - name: Generate Arch package files
        run: |
          BUILD_VERSION="$(grep -Pom1 '^project\(Polaris VERSION \K[^ ]+' CMakeLists.txt)"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          env \
            BRANCH="$BRANCH" \
            BUILD_VERSION="$BUILD_VERSION" \
            CLONE_URL="file://$GITHUB_WORKSPACE" \
            COMMIT="$COMMIT" \
            cmake -S . -B arch-pkgbuild \
              -DPOLARIS_CONFIGURE_PKGBUILD=ON \
              -DPOLARIS_CONFIGURE_ONLY=ON

      - name: Validate Arch package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          useradd -m builder
          pacman -S --noconfirm --needed cuda
          install -d "$CCACHE_DIR"
          chown -R builder:builder "$GITHUB_WORKSPACE"
          chown -R builder:builder "$CCACHE_DIR"
          su builder -c "git config --global protocol.file.allow always"
          su builder -c "git config --global --add safe.directory '$GITHUB_WORKSPACE'"
          su builder -c "cd '$GITHUB_WORKSPACE/arch-pkgbuild' && _use_cuda=true makepkg --nodeps --noconfirm --nocheck"

      - name: Smoke test Arch package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          pkg_path="$(find arch-pkgbuild -maxdepth 1 -type f -name 'polaris-[0-9]*-x86_64.pkg.tar.*' ! -name '*debug*' | sort | head -n 1)"
          if [ -z "$pkg_path" ]; then
            echo "No Arch package was produced" >&2
            exit 1
          fi

          tar -xOf "$pkg_path" .BUILDINFO | tee arch-pkgbuild/package-buildinfo.txt
          tar -xOf "$pkg_path" .PKGINFO | tee arch-pkgbuild/package-pkginfo.txt

          if ! grep -Fq "installed = cuda-" arch-pkgbuild/package-buildinfo.txt; then
            echo "Arch package was not built with CUDA installed" >&2
            exit 1
          fi

          if ! grep -Fq "optdepend = cuda: Nvidia GPU encoding support" arch-pkgbuild/package-pkginfo.txt; then
            echo "Arch package metadata does not advertise CUDA/Nvidia GPU encoding support" >&2
            exit 1
          fi

          boost_version="$(pacman -Q boost-libs | awk '{ print $2 }' | sed 's/-.*$//')"
          if ! grep -Fq "installed = boost-libs-${boost_version}-" arch-pkgbuild/package-buildinfo.txt; then
            echo "Arch package was not built against installed boost-libs ${boost_version}" >&2
            exit 1
          fi

          extract_dir="$(mktemp -d)"
          bsdtar -xf "$pkg_path" -C "$extract_dir" usr/bin
          binary="$(find "$extract_dir/usr/bin" -maxdepth 1 -type f -name 'polaris-*' -perm -111 | sort | head -n 1)"
          if [ -z "$binary" ]; then
            echo "Packaged Polaris binary was not found" >&2
            exit 1
          fi

          strings "$binary" > arch-pkgbuild/package-strings.txt
          if ! grep -Fq "Couldn't initialize cuda" arch-pkgbuild/package-strings.txt; then
            echo "Packaged Polaris binary does not contain CUDA support" >&2
            exit 1
          fi

          readelf -d "$binary" | tee arch-pkgbuild/package-needed.txt
          boost_sonames="$(awk -F '[][]' '/NEEDED.*libboost/ { print $2 }' arch-pkgbuild/package-needed.txt)"
          if [ -z "$boost_sonames" ]; then
            echo "No dynamic Boost sonames were found in the Arch package" >&2
            exit 1
          fi

          while IFS= read -r soname; do
            if [[ "$soname" != *".${boost_version}" ]]; then
              echo "Arch package Boost soname mismatch: ${soname} does not match boost-libs ${boost_version}" >&2
              exit 1
            fi
          done <<< "$boost_sonames"

          pacman -U --noconfirm "$pkg_path"
          installed_binary="$(pacman -Ql polaris | awk '/\/usr\/bin\/polaris-[^/]+$/ { print $2; exit }')"
          if [ -z "$installed_binary" ]; then
            echo "Installed Polaris binary was not found" >&2
            exit 1
          fi

          ldd "$installed_binary" | tee arch-pkgbuild/package-ldd.txt
          if grep -Fq "not found" arch-pkgbuild/package-ldd.txt; then
            echo "Installed Arch package has unresolved shared-library dependencies" >&2
            exit 1
          fi

          polaris --version | tee arch-pkgbuild/package-version.txt

      - name: Summarize Arch validation
        if: always()
        run: |
          {
            echo "## Arch validation"
            echo
            echo "- Generated package files: \`arch-pkgbuild/PKGBUILD\`, \`arch-pkgbuild/polaris.install\`"
            echo "- Built package directory: \`arch-pkgbuild/\`"
            echo "- Build tree directory: \`build/\`"
            echo "- Package artifacts and generated packaging files are uploaded from this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Arch packaging artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-packaging-files
          path: |
            arch-pkgbuild/PKGBUILD
            arch-pkgbuild/polaris.install
          if-no-files-found: warn

      - name: Upload Arch package outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-package-outputs
          path: |
            arch-pkgbuild/*.pkg.tar.*
            arch-pkgbuild/*.pkg.tar.*.sig
            arch-pkgbuild/*.src.tar.*
            arch-pkgbuild/*.log
            arch-pkgbuild/package-*.txt
          if-no-files-found: warn

      - name: Upload Arch build metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-build-metadata
          path: |
            build/dev.polaris-stream.app.Polaris.metainfo.xml
            build/dev.polaris-stream.app.Polaris.desktop
            build/dev.polaris-stream.app.Polaris.terminal.desktop
          if-no-files-found: warn

  ubuntu-build:
    name: Ubuntu build
    needs: web-checks
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ~/.cache/ccache
      CCACHE_COMPILERCHECK: content

    steps:
      - uses: actions/checkout@v5

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          for attempt in 1 2 3 4 5; do
            git submodule sync --recursive
            if git -c protocol.version=2 submodule update --init --force --recursive --jobs 1; then
              exit 0
            fi
            echo "submodule update failed on attempt ${attempt}" >&2
            git submodule deinit --force --all || true
            sleep $((attempt * 15))
          done
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Cache C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: polaris-ubuntu-ccache-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*', 'tests/**/*') }}
          restore-keys: |
            polaris-ubuntu-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache cmake ninja-build \
            libboost-all-dev libssl-dev libevdev-dev \
            libpulse-dev libopus-dev libcurl4-openssl-dev \
            libdrm-dev libgbm-dev libcap-dev libwayland-dev \
            libpipewire-0.3-dev libx11-dev libxrandr-dev \
            libxfixes-dev libxi-dev libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libva-dev libminiupnpc-dev libnotify-dev nlohmann-json3-dev \
            libappindicator3-dev libgtk-3-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            wayland-protocols

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPOLARIS_ASSETS_DIR=share/polaris \
            -DPOLARIS_EXECUTABLE_PATH=/usr/bin/polaris \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF

      - name: Download prebuilt web UI bundle
        uses: actions/download-artifact@v8
        with:
          name: web-ui-build
          path: .

      - name: Prepare prebuilt web UI bundle
        run: |
          mkdir -p build/assets build/CMakeFiles node_modules
          tar -xzf web-ui-build.tar.gz -C build/assets
          touch node_modules/.polaris-web-ui-npm.stamp build/CMakeFiles/web-ui-build.stamp

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run fast C++ tests
        run: ctest --test-dir build/tests --output-on-failure -R '^test_polaris$'

      - name: Build DEB package
        run: cpack -G DEB --config ./build/CPackConfig.cmake

      - name: Smoke test Ubuntu DEB package
        run: |
          set -euo pipefail

          deb_path="$(find build/cpack_artifacts -maxdepth 1 -type f -name '*.deb' | sort | head -n 1)"
          if [ -z "$deb_path" ]; then
            echo "No binary DEB was produced" >&2
            exit 1
          fi

          dpkg-deb --info "$deb_path" | tee build/cpack_artifacts/package-info.txt
          dpkg-deb --field "$deb_path" Depends | tee build/cpack_artifacts/package-depends.txt
          dpkg-deb --contents "$deb_path" | tee build/cpack_artifacts/package-files.txt

          sudo apt-get install -y "./$deb_path"
          package_name="$(dpkg-deb --field "$deb_path" Package)"
          binary="$(dpkg -L "$package_name" | awk '$0 == "/usr/bin/polaris" || /\/usr\/bin\/polaris-[^/]+$/ { print; exit }')"
          if [ -z "$binary" ]; then
            echo "Installed Polaris binary was not found" >&2
            exit 1
          fi

          readelf -d "$binary" | tee build/cpack_artifacts/package-needed.txt
          ldd "$binary" | tee build/cpack_artifacts/package-ldd.txt
          if grep -Fq "not found" build/cpack_artifacts/package-ldd.txt; then
            echo "Installed Ubuntu DEB has unresolved shared-library dependencies" >&2
            exit 1
          fi

          polaris --version | tee build/cpack_artifacts/package-version.txt

      - name: Summarize Ubuntu DEB validation
        if: always()
        run: |
          {
            echo "## Ubuntu 24.04 DEB validation"
            echo
            echo "- Build tree directory: \`build/\`"
            echo "- DEB output directory: \`build/cpack_artifacts/\`"
            echo "- DEB artifacts and generated CPack metadata are uploaded from this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Ubuntu DEB artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-24.04-deb-artifacts
          path: |
            build/cpack_artifacts/*.deb
          if-no-files-found: warn

      - name: Upload Ubuntu DEB metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-24.04-deb-metadata
          path: |
            build/cpack_artifacts/package-*.txt
            build/cpack_artifacts/_CPack_Packages/Linux/DEB/**/*.out
            build/cpack_artifacts/_CPack_Packages/Linux/DEB/**/*.err
          if-no-files-found: warn

  fedora-rpm-build:
    name: Fedora ${{ matrix.fedora }} RPM build
    needs: web-checks
    runs-on: ubuntu-24.04
    container:
      image: fedora:${{ matrix.fedora }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: '42'
            cc: gcc-14
            cxx: g++-14
            boost_static: ON
          - fedora: '43'
            cc: gcc-14
            cxx: g++-14
            boost_static: ON
          - fedora: '44'
            cc: gcc
            cxx: g++
            boost_static: OFF
    env:
      CCACHE_DIR: /github/home/.cache/ccache
      CCACHE_COMPILERCHECK: content
      NPM_CONFIG_CACHE: /github/home/.npm
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Bootstrap Fedora container
        run: |
          for attempt in 1 2 3; do
            dnf install -y dnf-plugins-core git && exit 0
            echo "dnf bootstrap failed on attempt ${attempt}" >&2
            dnf clean expire-cache || true
            sleep $((attempt * 10))
          done
          exit 1

      - uses: actions/checkout@v5

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          for attempt in 1 2 3 4 5; do
            git submodule sync --recursive
            if git -c protocol.version=2 submodule update --init --force --recursive --jobs 1; then
              exit 0
            fi
            echo "submodule update failed on attempt ${attempt}" >&2
            git submodule deinit --force --all || true
            sleep $((attempt * 15))
          done
          exit 1

      - name: Cache C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: polaris-fedora-${{ matrix.fedora }}-ccache-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*', 'tests/**/*') }}
          restore-keys: |
            polaris-fedora-${{ matrix.fedora }}-ccache-

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: /github/home/.npm
          key: polaris-fedora-${{ matrix.fedora }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            polaris-fedora-${{ matrix.fedora }}-npm-

      - name: Install Fedora build dependencies
        run: |
          for attempt in 1 2 3; do
            dnf builddep -y packaging/linux/fedora/Polaris.spec && exit 0
            echo "dnf builddep failed on attempt ${attempt}" >&2
            dnf clean expire-cache || true
            sleep $((attempt * 10))
          done
          exit 1

      - name: Install CI helper packages
        run: |
          for attempt in 1 2 3; do
            dnf install -y ccache ninja-build && exit 0
            echo "dnf helper package install failed on attempt ${attempt}" >&2
            dnf clean expire-cache || true
            sleep $((attempt * 10))
          done
          exit 1

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBOOST_USE_STATIC=${{ matrix.boost_static }} \
            -DPOLARIS_ASSETS_DIR=share/polaris \
            -DPOLARIS_EXECUTABLE_PATH=/usr/bin/polaris \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF

      - name: Download prebuilt web UI bundle
        uses: actions/download-artifact@v8
        with:
          name: web-ui-build
          path: .

      - name: Prepare prebuilt web UI bundle
        run: |
          mkdir -p build/assets build/CMakeFiles node_modules
          tar -xzf web-ui-build.tar.gz -C build/assets
          touch node_modules/.polaris-web-ui-npm.stamp build/CMakeFiles/web-ui-build.stamp

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run fast C++ tests
        run: ctest --test-dir build/tests --output-on-failure -R '^test_polaris$'

      - name: Build RPM package
        run: cpack -G RPM --config ./build/CPackConfig.cmake

      - name: Smoke test Fedora RPM package
        run: |
          set -euo pipefail

          rpm_path="$(find build/cpack_artifacts -maxdepth 1 -type f -name '*.rpm' ! -name '*.src.rpm' | sort | head -n 1)"
          if [ -z "$rpm_path" ]; then
            echo "No binary RPM was produced" >&2
            exit 1
          fi

          rpm -Kv "$rpm_path"
          rpm -qpi "$rpm_path" | tee build/cpack_artifacts/package-info.txt
          rpm -qpR "$rpm_path" | sort | tee build/cpack_artifacts/package-requires.txt

          expected_miniupnpc="$(rpm -q --provides miniupnpc | awk '/libminiupnpc\.so\.[0-9]+\(\)\(64bit\)/ { print $1; exit }')"
          actual_miniupnpc="$(awk '/libminiupnpc\.so\.[0-9]+\(\)\(64bit\)/ { print $1; exit }' build/cpack_artifacts/package-requires.txt)"
          if [ -z "$expected_miniupnpc" ] || [ "$actual_miniupnpc" != "$expected_miniupnpc" ]; then
            echo "RPM miniupnpc soname mismatch: expected '${expected_miniupnpc}', got '${actual_miniupnpc}'" >&2
            exit 1
          fi

          dnf install -y "$rpm_path"
          rpm -ql polaris | tee build/cpack_artifacts/package-files.txt
          binary="$(awk '$0 == "/usr/bin/polaris" || /\/usr\/bin\/polaris-[^/]+$/ { print; exit }' build/cpack_artifacts/package-files.txt)"
          if [ -z "$binary" ]; then
            echo "Installed Polaris binary was not found" >&2
            exit 1
          fi

          readelf -d "$binary" | tee build/cpack_artifacts/package-needed.txt
          ldd "$binary" | tee build/cpack_artifacts/package-ldd.txt
          if grep -Fq "not found" build/cpack_artifacts/package-ldd.txt; then
            echo "Installed Fedora RPM has unresolved shared-library dependencies" >&2
            exit 1
          fi

          polaris --version | tee build/cpack_artifacts/package-version.txt

      - name: Summarize Fedora RPM validation
        if: always()
        run: |
          {
            echo "## Fedora ${{ matrix.fedora }} RPM validation"
            echo
            echo "- Spec dependency source: \`packaging/linux/fedora/Polaris.spec\`"
            echo "- Build tree directory: \`build/\`"
            echo "- RPM output directory: \`build/cpack_artifacts/\`"
            echo "- RPM artifacts and generated CPack RPM metadata are uploaded from this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Fedora RPM artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fedora-${{ matrix.fedora }}-rpm-artifacts
          path: |
            build/cpack_artifacts/*.rpm
            build/cpack_artifacts/*.src.rpm
          if-no-files-found: warn

      - name: Upload Fedora RPM metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fedora-${{ matrix.fedora }}-rpm-metadata
          path: |
            build/cpack_artifacts/package-*.txt
            build/cpack_artifacts/_CPack_Packages/Linux/RPM/SPECS/*.spec
            build/cpack_artifacts/_CPack_Packages/Linux/RPM/*.out
            build/cpack_artifacts/_CPack_Packages/Linux/RPM/*.err
          if-no-files-found: warn

  release-assets:
    name: Release assets
    needs:
      - arch-build
      - ubuntu-build
      - fedora-rpm-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Arch package outputs
        uses: actions/download-artifact@v8
        with:
          name: arch-package-outputs
          path: release-assets/raw/arch

      - name: Download Fedora 42 RPM artifacts
        uses: actions/download-artifact@v8
        with:
          name: fedora-42-rpm-artifacts
          path: release-assets/raw/fedora42

      - name: Download Fedora 43 RPM artifacts
        uses: actions/download-artifact@v8
        with:
          name: fedora-43-rpm-artifacts
          path: release-assets/raw/fedora43

      - name: Download Fedora 44 RPM artifacts
        uses: actions/download-artifact@v8
        with:
          name: fedora-44-rpm-artifacts
          path: release-assets/raw/fedora44

      - name: Download Ubuntu 24.04 DEB artifacts
        uses: actions/download-artifact@v8
        with:
          name: ubuntu-24.04-deb-artifacts
          path: release-assets/raw/ubuntu24.04

      - name: Prepare release asset names
        run: |
          shopt -s nullglob
          mkdir -p release-assets/final

          arch_packages=()
          arch_sources=()
          arch_signatures=()
          for arch_path in release-assets/raw/arch/*; do
            case "$arch_path" in
              *.pkg.tar.*.sig)
                arch_signatures+=("$arch_path")
                ;;
              *debug*.pkg.tar.*)
                ;;
              *.pkg.tar.*)
                arch_packages+=("$arch_path")
                ;;
              *.src.tar.*)
                arch_sources+=("$arch_path")
                ;;
            esac
          done

          if [ "${#arch_packages[@]}" -eq 0 ]; then
            echo "No Arch package outputs were produced by the Arch packaging job" >&2
            exit 1
          fi

          arch_package_name="$(basename "${arch_packages[0]}")"
          arch_package_suffix="${arch_package_name#*.pkg.tar}"
          cp "${arch_packages[0]}" "release-assets/final/Polaris-arch-x86_64.pkg.tar${arch_package_suffix}"

          if [ "${#arch_signatures[@]}" -gt 0 ]; then
            cp "${arch_signatures[0]}" "release-assets/final/Polaris-arch-x86_64.pkg.tar${arch_package_suffix}.sig"
          fi

          if [ "${#arch_sources[@]}" -gt 0 ]; then
            arch_source_name="$(basename "${arch_sources[0]}")"
            arch_source_suffix="${arch_source_name#*.src.tar}"
            cp "${arch_sources[0]}" "release-assets/final/Polaris-arch-src.tar${arch_source_suffix}"
          fi

          copy_fedora_rpms() {
            local fedora_version="$1"
            local raw_dir="$2"
            local binary_rpms=()
            local source_rpms=()
            local rpm_path

            for rpm_path in "${raw_dir}"/*.rpm; do
              if [[ "$rpm_path" == *.src.rpm ]]; then
                source_rpms+=("$rpm_path")
              else
                binary_rpms+=("$rpm_path")
              fi
            done

            if [ "${#binary_rpms[@]}" -eq 0 ]; then
              echo "No binary RPMs were produced for Fedora ${fedora_version}" >&2
              exit 1
            fi

            cp "${binary_rpms[0]}" "release-assets/final/Polaris-fedora${fedora_version}-x86_64.rpm"

            if [ "${#source_rpms[@]}" -gt 0 ]; then
              cp "${source_rpms[0]}" "release-assets/final/Polaris-fedora${fedora_version}-src.rpm"
            fi
          }

          copy_fedora_rpms 42 release-assets/raw/fedora42
          copy_fedora_rpms 43 release-assets/raw/fedora43
          copy_fedora_rpms 44 release-assets/raw/fedora44

          ubuntu_debs=()
          for deb_path in release-assets/raw/ubuntu24.04/*.deb; do
            ubuntu_debs+=("$deb_path")
          done

          if [ "${#ubuntu_debs[@]}" -eq 0 ]; then
            echo "No binary DEBs were produced for Ubuntu 24.04" >&2
            exit 1
          fi

          cp "${ubuntu_debs[0]}" "release-assets/final/Polaris-ubuntu24.04-x86_64.deb"

          ls -la release-assets/final

      - name: Upload release assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated Fedora, Ubuntu, and Arch release assets for ${GITHUB_REF_NAME}."
          fi

          gh release upload "${GITHUB_REF_NAME}" release-assets/final/* --clobber

      - name: Verify release assets on GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          asset_count=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '[.assets[].name | select(. == "Polaris-fedora42-x86_64.rpm" or . == "Polaris-fedora43-x86_64.rpm" or . == "Polaris-fedora44-x86_64.rpm" or . == "Polaris-ubuntu24.04-x86_64.deb" or . == "Polaris-arch-x86_64.pkg.tar.zst")] | length')
          if [ "${asset_count}" -ne 5 ]; then
            echo "Expected Fedora 42, Fedora 43, Fedora 44, Ubuntu 24.04, and Arch binary release assets on ${GITHUB_REF_NAME}, found ${asset_count}" >&2
            exit 1
          fi
