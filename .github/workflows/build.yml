name: Build Polaris

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  web-checks:
    name: Web checks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install web dependencies
        run: npm ci --no-audit --fund=false

      - name: Lint web UI
        run: npm run lint

      - name: Test web UI
        run: npm run test

      - name: Build web UI bundle
        run: npm run build-clean

      - name: Pack web UI bundle
        run: tar -czf web-ui-build.tar.gz -C build/assets web

      - name: Upload web UI bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-build
          path: web-ui-build.tar.gz
          if-no-files-found: error

  arch-build:
    name: Arch build
    needs: web-checks
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    env:
      CCACHE_DIR: /github/home/.cache/ccache
      CCACHE_COMPILERCHECK: content

    steps:
      - name: Bootstrap Arch container
        run: pacman -Syu --noconfirm --needed archlinux-keyring git

      - uses: actions/checkout@v5
        if: startsWith(github.ref, 'refs/tags/v')

      - uses: actions/checkout@v5
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          submodules: recursive

      - name: Cache C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: polaris-arch-ccache-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*', 'tests/**/*') }}
          restore-keys: |
            polaris-arch-ccache-

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: /github/home/.npm
          key: polaris-arch-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            polaris-arch-npm-

      - name: Install dependencies
        run: |
          pacman -S --noconfirm --needed \
            appstream appstream-glib avahi base-devel boost boost-libs ccache cmake curl \
            desktop-file-utils ffmpeg gtk3 libayatana-appindicator libcap \
            gcc libdrm libevdev libmfx libnotify libpulse libva libx11 libxcb \
            libxfixes libxi libxrandr libxtst mesa miniupnpc ninja nodejs \
            nlohmann-json npm numactl openssl opus pipewire wayland wayland-protocols which

      - name: Configure
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          cmake -B build -G Ninja \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF

      - name: Download prebuilt web UI bundle
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/download-artifact@v8
        with:
          name: web-ui-build
          path: .

      - name: Prepare prebuilt web UI bundle
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p build/assets build/CMakeFiles node_modules
          tar -xzf web-ui-build.tar.gz -C build/assets
          touch node_modules/.polaris-web-ui-npm.stamp build/CMakeFiles/web-ui-build.stamp

      - name: Build
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: cmake --build build -j"$(nproc)"

      - name: Run fast C++ tests
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ctest --test-dir build/tests --output-on-failure -R '^test_polaris$'

      - name: Generate Arch package files
        run: |
          BUILD_VERSION="$(grep -Pom1 '^project\(Polaris VERSION \K[^ ]+' CMakeLists.txt)"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          env \
            BRANCH="$BRANCH" \
            BUILD_VERSION="$BUILD_VERSION" \
            CLONE_URL="file://$GITHUB_WORKSPACE" \
            COMMIT="$COMMIT" \
            cmake -S . -B arch-pkgbuild \
              -DPOLARIS_CONFIGURE_PKGBUILD=ON \
              -DPOLARIS_CONFIGURE_ONLY=ON

      - name: Validate Arch package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          useradd -m builder
          install -d "$CCACHE_DIR"
          chown -R builder:builder "$GITHUB_WORKSPACE"
          chown -R builder:builder "$CCACHE_DIR"
          su builder -c "git config --global protocol.file.allow always"
          su builder -c "git config --global --add safe.directory '$GITHUB_WORKSPACE'"
          su builder -c "cd '$GITHUB_WORKSPACE/arch-pkgbuild' && makepkg --nodeps --noconfirm --nocheck"

      - name: Summarize Arch validation
        if: always()
        run: |
          {
            echo "## Arch validation"
            echo
            echo "- Generated package files: \`arch-pkgbuild/PKGBUILD\`, \`arch-pkgbuild/polaris.install\`"
            echo "- Built package directory: \`arch-pkgbuild/\`"
            echo "- Build tree directory: \`build/\`"
            echo "- Package artifacts and generated packaging files are uploaded from this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Arch packaging artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-packaging-files
          path: |
            arch-pkgbuild/PKGBUILD
            arch-pkgbuild/polaris.install
          if-no-files-found: warn

      - name: Upload Arch package outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-package-outputs
          path: |
            arch-pkgbuild/*.pkg.tar.*
            arch-pkgbuild/*.pkg.tar.*.sig
            arch-pkgbuild/*.src.tar.*
            arch-pkgbuild/*.log
          if-no-files-found: warn

      - name: Upload Arch build metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arch-build-metadata
          path: |
            build/dev.polaris-stream.app.Polaris.metainfo.xml
            build/dev.polaris-stream.app.Polaris.desktop
            build/dev.polaris-stream.app.Polaris.terminal.desktop
          if-no-files-found: warn

  ubuntu-build:
    name: Ubuntu build
    needs: web-checks
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ~/.cache/ccache
      CCACHE_COMPILERCHECK: content

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Cache C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: polaris-ubuntu-ccache-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*', 'tests/**/*') }}
          restore-keys: |
            polaris-ubuntu-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache cmake ninja-build \
            libboost-all-dev libssl-dev libevdev-dev \
            libpulse-dev libopus-dev libcurl4-openssl-dev \
            libdrm-dev libgbm-dev libcap-dev libwayland-dev \
            libpipewire-0.3-dev libx11-dev libxrandr-dev \
            libxfixes-dev libxi-dev libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libva-dev libminiupnpc-dev libnotify-dev nlohmann-json3-dev \
            libappindicator3-dev libgtk-3-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            wayland-protocols

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF

      - name: Download prebuilt web UI bundle
        uses: actions/download-artifact@v8
        with:
          name: web-ui-build
          path: .

      - name: Prepare prebuilt web UI bundle
        run: |
          mkdir -p build/assets build/CMakeFiles node_modules
          tar -xzf web-ui-build.tar.gz -C build/assets
          touch node_modules/.polaris-web-ui-npm.stamp build/CMakeFiles/web-ui-build.stamp

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run fast C++ tests
        run: ctest --test-dir build/tests --output-on-failure -R '^test_polaris$'

  fedora-rpm-build:
    name: Fedora RPM build
    needs: web-checks
    runs-on: ubuntu-24.04
    container:
      image: fedora:42
    env:
      CCACHE_DIR: /github/home/.cache/ccache
      CCACHE_COMPILERCHECK: content
      NPM_CONFIG_CACHE: /github/home/.npm
      CC: gcc-14
      CXX: g++-14

    steps:
      - name: Bootstrap Fedora container
        run: dnf install -y dnf-plugins-core git

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: polaris-fedora-ccache-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*', 'tests/**/*') }}
          restore-keys: |
            polaris-fedora-ccache-

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: /github/home/.npm
          key: polaris-fedora-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            polaris-fedora-npm-

      - name: Install Fedora build dependencies
        run: dnf builddep -y packaging/linux/fedora/Polaris.spec

      - name: Install CI helper packages
        run: dnf install -y ccache ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF

      - name: Download prebuilt web UI bundle
        uses: actions/download-artifact@v8
        with:
          name: web-ui-build
          path: .

      - name: Prepare prebuilt web UI bundle
        run: |
          mkdir -p build/assets build/CMakeFiles node_modules
          tar -xzf web-ui-build.tar.gz -C build/assets
          touch node_modules/.polaris-web-ui-npm.stamp build/CMakeFiles/web-ui-build.stamp

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run fast C++ tests
        run: ctest --test-dir build/tests --output-on-failure -R '^test_polaris$'

      - name: Build RPM package
        run: cpack -G RPM --config ./build/CPackConfig.cmake

      - name: Summarize Fedora RPM validation
        if: always()
        run: |
          {
            echo "## Fedora RPM validation"
            echo
            echo "- Spec dependency source: \`packaging/linux/fedora/Polaris.spec\`"
            echo "- Build tree directory: \`build/\`"
            echo "- RPM output directory: \`build/cpack_artifacts/\`"
            echo "- RPM artifacts and generated CPack RPM metadata are uploaded from this job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Fedora RPM artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fedora-rpm-artifacts
          path: |
            build/cpack_artifacts/*.rpm
            build/cpack_artifacts/*.src.rpm
          if-no-files-found: warn

      - name: Upload Fedora RPM metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fedora-rpm-metadata
          path: |
            build/cpack_artifacts/_CPack_Packages/Linux/RPM/SPECS/*.spec
            build/cpack_artifacts/_CPack_Packages/Linux/RPM/*.out
            build/cpack_artifacts/_CPack_Packages/Linux/RPM/*.err
          if-no-files-found: warn

  release-assets:
    name: Release assets
    needs:
      - arch-build
      - fedora-rpm-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Arch package outputs
        uses: actions/download-artifact@v8
        with:
          name: arch-package-outputs
          path: release-assets/raw/arch

      - name: Download Fedora RPM artifacts
        uses: actions/download-artifact@v8
        with:
          name: fedora-rpm-artifacts
          path: release-assets/raw/fedora

      - name: Prepare release asset names
        run: |
          shopt -s nullglob
          mkdir -p release-assets/final

          arch_packages=()
          arch_sources=()
          arch_signatures=()
          for arch_path in release-assets/raw/arch/*; do
            case "$arch_path" in
              *.pkg.tar.*.sig)
                arch_signatures+=("$arch_path")
                ;;
              *.pkg.tar.*)
                arch_packages+=("$arch_path")
                ;;
              *.src.tar.*)
                arch_sources+=("$arch_path")
                ;;
            esac
          done

          if [ "${#arch_packages[@]}" -eq 0 ]; then
            echo "No Arch package outputs were produced by the Arch packaging job" >&2
            exit 1
          fi

          arch_package_name="$(basename "${arch_packages[0]}")"
          arch_package_suffix="${arch_package_name#*.pkg.tar}"
          cp "${arch_packages[0]}" "release-assets/final/Polaris-arch-x86_64.pkg.tar${arch_package_suffix}"

          if [ "${#arch_signatures[@]}" -gt 0 ]; then
            cp "${arch_signatures[0]}" "release-assets/final/Polaris-arch-x86_64.pkg.tar${arch_package_suffix}.sig"
          fi

          if [ "${#arch_sources[@]}" -gt 0 ]; then
            arch_source_name="$(basename "${arch_sources[0]}")"
            arch_source_suffix="${arch_source_name#*.src.tar}"
            cp "${arch_sources[0]}" "release-assets/final/Polaris-arch-src.tar${arch_source_suffix}"
          fi

          binary_rpms=()
          source_rpms=()
          for rpm_path in release-assets/raw/fedora/*.rpm; do
            if [[ "$rpm_path" == *.src.rpm ]]; then
              source_rpms+=("$rpm_path")
            else
              binary_rpms+=("$rpm_path")
            fi
          done

          if [ "${#binary_rpms[@]}" -eq 0 ]; then
            echo "No binary RPMs were produced by the Fedora packaging job" >&2
            exit 1
          fi

          cp "${binary_rpms[0]}" release-assets/final/Polaris-fedora42-x86_64.rpm

          if [ "${#source_rpms[@]}" -gt 0 ]; then
            cp "${source_rpms[0]}" release-assets/final/Polaris-fedora42-src.rpm
          fi

          ls -la release-assets/final

      - name: Upload release assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated Fedora and Arch release assets for ${GITHUB_REF_NAME}."
          fi

          gh release upload "${GITHUB_REF_NAME}" release-assets/final/* --clobber

      - name: Verify release assets on GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          asset_count=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '[.assets[].name | select(. == "Polaris-fedora42-x86_64.rpm" or . == "Polaris-arch-x86_64.pkg.tar.zst")] | length')
          if [ "${asset_count}" -ne 2 ]; then
            echo "Expected Fedora and Arch binary release assets on ${GITHUB_REF_NAME}, found ${asset_count}" >&2
            exit 1
          fi
