name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '23 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Detect code scanning availability
        id: code-scanning
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          status="$(
            curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1"
          )"

          if [[ "$status" == "200" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning is not enabled or not accessible for ${GITHUB_REPOSITORY} (HTTP ${status}); skipping CodeQL."
          fi

      - name: Initialize CodeQL
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up Node.js
        if: matrix.language == 'cpp' && steps.code-scanning.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install native build dependencies
        if: matrix.language == 'cpp' && steps.code-scanning.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libboost-all-dev libssl-dev libevdev-dev \
            libpulse-dev libopus-dev libcurl4-openssl-dev \
            libdrm-dev libgbm-dev libcap-dev libwayland-dev \
            libpipewire-0.3-dev libx11-dev libxrandr-dev \
            libxfixes-dev libxi-dev libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libva-dev libminiupnpc-dev libnotify-dev \
            libappindicator3-dev libgtk-3-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            nodejs npm wayland-protocols

      - name: Build for CodeQL
        if: matrix.language == 'cpp' && steps.code-scanning.outputs.enabled == 'true'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPOLARIS_ENABLE_CUDA=OFF \
            -DCUDA_FAIL_ON_MISSING=OFF
          cmake --build build -j"$(nproc)"

      - name: Skip CodeQL
        if: steps.code-scanning.outputs.enabled != 'true'
        run: echo "CodeQL skipped because code scanning is not enabled for this repository."

      - name: Analyze
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4
